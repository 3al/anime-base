# SYSTEM/spec_changelog.yaml — когда введено каждое требование create-спеки.
# Контент — vault-side; схему задаёт фреймворк (audit-by-creator/references/ledger-protocol.md §4.1).
#
# Назначение: epoch-conformance. audit-by-creator / audit-note реклассифицируют находку
# MISSING/WRONG_FORMAT в SCHEMA_DRIFT (из score исключается), если требование введено в спеку
# ПОЗЖЕ даты `created` карточки — автор не мог реализовать несуществовавшее. Нет записи =
# требование пред-существовало → штрафуется как author-defect. Логировать нужно только
# ПОСТ-авторские добавления (то, что введено после самых старых карточек). Базовую спеку
# (поля с рождения волта) логировать не обязательно.
#
# Ретро-сев (2026-06-03): старейшие карточки волта созданы 2026-05-23 (Nausicaa) … 05-31.
# Батч планов A/B/C + §8 (online_url) внесён 2026-06-02 → предшествующие карточки его лишены
# → дрейф. Источник дат — git (e841722 / 2ffd790 / 5270052, все 2026-06-02) + Roadmap §3/§8/§16.

v: 1
kinds:
  anime:
    # 2026-06-10: title_cyrillic — обязательное кириллическое название тайтла (устоявшаяся
    # русская локализация ИЛИ предложенный пользователю перевод). Введён ПОЗЖЕ всех существующих
    # карточек → для них SCHEMA_DRIFT (vault-долг на бэкафилл, не вина автора).
    - requirement: title_cyrillic
      introduced: 2026-06-10
      kind_of: field
    # §8 + план C: USER-ONLY и оценочные always-present поля, добавленные после первых 6 карточек.
    - requirement: online_url
      introduced: 2026-06-02
      kind_of: field
    - requirement: art_score
      introduced: 2026-06-02
      kind_of: field
    - requirement: story_score
      introduced: 2026-06-02
