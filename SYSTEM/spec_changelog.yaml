      introduced: 2026-06-02
      kind_of: field
    # B-012 (2026-06-01): расширение вложения должно соответствовать реальному типу содержимого
    # (WebP→.webp, JPEG→.jpg). До B-012 — хардкод .jpg/.png в скиллах. Кросс-kind правило,
    # дублируется в каждый kind с обложкой. Дата: git -S 'реальный тип содержимого' → 9178660 (06-01).
    - requirement: cover_ext_matches_content
      introduced: 2026-06-01
      kind_of: format
    # §28 (2026-06-07): reverse-leg-субъект-артефакт обобщён на все carded-kinds (был только
    # character 2026-06-06). Markup reverse-leg (миниатюра+WikiLink субъекта в чужих картах) —
    # субъект-артефакт с cover-sync во ВСЕ входящие при позднем постере; владение описанием по
    # git-blame (пути i/ii). Источник правила — Linking_guidelines «Reverse-leg…». Пре-06-07 → SCHEMA_DRIFT.
    - requirement: reverse_leg_subject_artifact
      introduced: 2026-06-07
      kind_of: format
    # 2026-06-07 (§29): tags выбираются ИЗ канона Tag_taxonomy; новый тег в канон — только по
    # критерию приёма (правило 8: переиспользуемая ось, не франшизо/сущность-узкий ярлык,
    # ортогонален enum); заводя тег — проставить на все facet-сиблинги (правило 9), не точечно.
    # Раньше create-скиллы лили любой придуманный тег в канон на одну карточку (46% синглтонов +
    # тег-призрак auto-memories-doll). Пре-06-07 карточки → SCHEMA_DRIFT (vault-долг, не вина автора).
    - requirement: tag_canon_discipline
