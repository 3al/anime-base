# SYSTEM/tag_taxonomy.yaml — машиночитаемый канон тегов (yaml = SSOT).
#
# Контент (набор тегов) — vault-side; СХЕМУ задаёт фреймворк (как enums.yaml /
# spec_changelog.yaml). Человекочитаемый вид `SYSTEM/Tag_taxonomy.md` ГЕНЕРИРУЕТСЯ
# отсюда (core/lib/tag_taxonomy_render.mjs) — править руками только этот yaml.
#
# Правила тегирования (1–9) и критерий приёма в канон живут в framework-governance
# (.claude/skills/audit-by-creator/references/tag-discipline.md), НЕ здесь — этот
# файл только канон тематических/категорийных/формат-тегов.
#
# Схема записи:
#   tags:
#     - name: <kebab-case>            # сам тег (правило 1: только [a-z-])
#       group: category|theme|format  # классификация (информативно)
#       description: <когда ставить>  # человекочитаемое пояснение → колонка в .md
#       applies_to_kinds: [<kind>]    # опц. — тег осмыслен только для этих note_kind
#       adult_gated: false            # опц. — тег под adult-гейтом волта

v: 1
tags:
  - name: post-apocalyptic
    group: theme
    description: "Содержание разворачивается после глобальной катастрофы (ядерной, экологической, биологической)"
  - name: ecological
    group: theme
    description: "Центральная тема — взаимоотношения человека и природы, экосистемы, биосфера"
  - name: japanese-animation
    group: theme
    description: "Содержание касается японской анимации (история индустрии, ключевые фигуры, эпохи)"
  - name: film-composer
    group: theme
    description: "Содержание описывает кинокомпозитора или его работы"
  - name: pacifist
    group: theme
    description: "Персонаж или произведение, центральная черта которого — сознательный отказ от насилия как метода решения конфликта"
  - name: militarist
    group: theme
    description: "Персонаж или произведение, центральная черта которого — приоритет силового решения, военная экспансия как метод, преданность армии как ценность"
  - name: pragmatist
    group: theme
    description: "Персонаж, чья определяющая черта — прагматизм: решения принимаются на основе практической выгоды и оценки последствий, а не идеологии или эмоций"
  - name: monarch
    group: theme
    description: "Персонаж — монарх (король, император, князь и т.п.), чья роль правителя — значимая часть характера и сюжета"
  - name: shoujo
    group: theme
    description: "Произведение целевой демографии shoujo (девочки/девушки-подростки). Демографическая категория, не жанр — не дублируется полем `genres`"
  - name: coming-of-age
    group: theme
    description: "Центральная тема — взросление, формирование личности подростка через социальные испытания"
  - name: mentor-figure
    group: theme
    description: "Персонаж в роли наставника/старшего: направляет, обучает, эмоционально поддерживает протагониста"
  - name: school
    group: theme
    description: "Действие разворачивается в школе/академии; школьная жизнь — ключевой элемент сюжета или контекста"
  - name: implied-romance
    group: theme
    description: "Романтические чувства между персонажами подразумеваются, но не заявлены прямо (подтекст, намёки, «химия»)"
  - name: photographer
    group: theme
    description: "Персонаж или произведение, связанное с фотографией, фотоклубом, photojournalism"
  - name: tragic-hero
    group: theme
    description: "Персонаж, чья судьба или личная история несут элементы трагедии, страдания как движущая сила характера"
  - name: school-life
    group: theme
    description: "Повседневная школьная жизнь, club-деятельность — не путать с `school` (сам факт школьного сеттинга)"
  - name: working-woman
    group: theme
    description: "Женский персонаж, чья профессиональная карьера и трудовое становление — ключевой аспект характера/сюжета"
  - name: emotional-growth
    group: theme
    description: "Центральная арка персонажа — развитие эмоционального интеллекта, обучение распознаванию и выражению чувств"
  - name: competitive
    group: theme
    description: "Персонаж с ярко выраженным стремлением к превосходству, соперничеству, доказательству своей компетентности"
  - name: unrequited-love
    group: theme
    description: "Неразделённая любовь как значимый сюжетный/характерный элемент"
  - name: technology-transition
    group: theme
    description: "Сюжет или тема касается перехода от традиционных к новым технологиям коммуникации/труда (письма → телефон, ручной труд → автоматизация)"
  - name: selflessness
    group: theme
    description: "Персонаж, чья определяющая черта — самоотверженность: ставит нужды других прежде собственных, помогает прежде, чем попросят"
  - name: war-orphan
    group: theme
    description: "Персонаж, потерявший родителей на войне; сиротство как ключевой элемент бэкграунда и мотивации"
  - name: caregiver
    group: theme
    description: "Персонаж, взявший на себя заботу о близком (больном, сломленном, зависимом родственнике) как значимая часть его истории"
  - name: war-veteran
    group: theme
    description: "Персонаж — ветеран войны; военное прошлое (служба, звание, фронтовой опыт) определяет его характер и послевоенную жизнь"
  - name: found-family
    group: theme
    description: "Связь персонажей как обретённой (не кровной) семьи: опека, наставничество-как-родительство, дом-вне-дома"
  - name: infidelity
