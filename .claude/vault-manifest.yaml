# Vault manifest — declarative configuration for /init-vault.
# Generated by vault-bootstrap setup. Edit freely.

schema_version: 1
language: ru   # change if your vault content is in a different language

# Modules to install. Dependency resolution is automatic — order does not matter.
# Comment out modules you do not need.
#
# Available modules:
#   [mandatory] core                   Core module — обязательная база для любого волта в bootstrap-фреймворке.
#   [optional]  harness-claude-code    Регистрирует MCP-серверы из всех модулей манифеста в ~/.claude.json
#   [mandatory] skills-common          Тема-нейтральные скиллы, общие для любого волта: fix-links, audit-note,
#   [optional]  vault-index            Структурный MCP-сервер волта: индекс frontmatter, граф ссылок, lint, query.
#   [optional]  vault-semantic         Семантический MCP-сервер волта (L2 в архитектуре RAG) + L3 skill

modules:
  - core
  - harness-claude-code
  - harness-opencode
  - skills-common
  - vault-index
  - vault-semantic

# Folders — routing-table для скилла /new-note.
# Каждая запись описывает тематическую папку волта с описанием
# и (опционально) ключевыми словами / тематическим create-skill.
# Если оставить пустым — /new-note при первом запуске поможет
# зарегистрировать структуру интерактивно.
#
# Пример:
#   folders:
#     - path: GUIDES/
#       description: "Руководства, инструкции, методики"
#       keywords: [guide, howto, tutorial]
#     - path: PROJECTS/
#       description: "Описания проектов и их статусы"
#       create_skill: /new-project   # тематический create-handler (опционально)
folders:
  - path: ANIME/
    description: "Карточки аниме-тайтлов: сериалы, фильмы, OVA"
    keywords: [anime, аниме, series, movie, ova]
    create_skill: /new-anime
  - path: PERSONS/
    description: "Карточки людей из аниме-индустрии: режиссёры, сценаристы, композиторы, продюсеры, аниматоры"
    keywords: [person, персона, человек, режиссёр, director, сценарист, composer, mangaka]
    create_skill: /new-person
  - path: MANGA/
    description: "Карточки манги, ранобэ, light novel"
    keywords: [manga, манга, ranobe, light novel, ранобэ]
    create_skill: /new-manga
  - path: STUDIOS/
    description: "Карточки анимационных студий-производителей (MAPPA, Madhouse, Ufotable, Studio Ghibli и т.п.)"
    keywords: [studio, студия, animation studio, anime production]
    create_skill: /new-studio
  - path: CHARACTERS/
    description: "Карточки вымышленных персонажей аниме и манги"
    keywords: [character, персонаж, hero, герой, villain, antagonist]
    create_skill: /new-character

# Reciprocity pairs — kind-пары, для которых межкарточные навигационные связи
# обязаны быть двунаправленными по конвенции волта. Читается /fix-links (под-режим
# asymmetric) + tool vault_asymmetric_links. Пусто/отсутствует = проверка выключена (opt-in).
# Cross-kind пара НАПРАВЛЕННАЯ: чтобы покрыть обе стороны character↔anime, нужны ОБЕ
# записи [character, anime] и [anime, character]. Anime_Base:
#   • character↔character — нарративные связи в ## Связи.
#   • character↔anime — порог наличие карточки персонажа: карточка есть → обе стороны
#     обязательны (## Тайтлы у персонажа ⟷ ## Персонажи у тайтла). См. Linking_guidelines.
#   person↔anime НЕ включена: voice-actor в person.works[]→anime, но не в anime.staff[] →
#   by-design односторонняя, пара false-флагала бы каждого сэйю. См. docs/Asymmetric_Links_Spec.md §5.
reciprocity_pairs:
  - [character, character]
  - [character, anime]
  - [anime, character]
  - [manga, character]
  - [character, manga]
  - [manga, anime]
  - [anime, manga]
  - [manga, person]
  - [person, manga]

# Severity для asymmetric-link issue в vault_lint (per-vault). WARN (дефолт) | ERROR.
# Anime_Base: ERROR — реципрокность character↔character и character↔anime железная
# (см. Linking_guidelines § character / «Взаимность с anime»).
asymmetry_severity: ERROR

# Порог проверки too-many-links в vault_lint (per-vault). Число = порог + в тексте issue;
# null = проверка отключена; отсутствие поля = дефолт 15. Читается /fix-links (lint) и
# /audit-note, прокидывается в vault_lint как linkCap.
# Anime_Base: null — gallery/cast-карточки штатно дают десятки структурных ссылок,
# хардкод-порог ложно срабатывал. «Чистый lint = доверяю» восстановлен.
link_cap: null

# --- Lint-бэкстопы v0.7.0 (Roadmap §22–§23). Полный каталог: docs/Vault_Bootstrap_Architecture.md ---

# user-only-fabricated (HEURISTIC, opt-in): USER-ONLY-секция, заполненная не-стабом
# на model-authored (co_authored=модель) + quality≠verified карточке → WARN (вероятная
# фабрикация). Стаб-фразы создателей — в whitelist (подавляют легитимный плейсхолдер).
# Включено: ловит кейс Cattleya (фабрикованный отзыв). Сейчас 2 FP на anime-карточках
# с реальными пользовательскими отзывами (model-co_authored draft) — снимутся при verify.
user_only_sections:
  - "## Личный отзыв"
user_only_stub_whitelist:
  - "Заполните личный отзыв"                       # стаб /new-character
  - "Эту секцию можно дополнять по мере просмотра"  # плейсхолдер /new-anime

# cover-ref-mismatch (structural, default-on) — НЕ требует ключа, активен по дефолту
# (images.cover / _cover). На приёмке поймал реальный дефект Iris_Cannary (.jpg при .png).

# name-surface-mismatch (structural, opt-in): basename должен СОДЕРЖАТЬ все токены name_romaji
# (order/diacritic-нечувствительно, лишние токены вроде титулов допустимы — vault-index 0.7.1).
# Включено после фикса F1: 9 прежних FP (Hodgins_Claudia↔Claudia Hodgins, King_Jihl,
# Nausicaa↔Nausicaä и др.) сняты, кейс Katteya_Bodler по-прежнему ловится.
name_surface_pairs:
  - { kind: character, basenameField: name_romaji }

# mixed-script-prose (HEURISTIC, opt-in): инородный скрипт в кириллической прозе. Включено
# после фикса F2 (vault-index 0.7.1: maskExempt маскирует callout-маркеры [!warning];
# capitalized-щажение перед диакритик-веткой → макрон-имена Itō/Satō не флагаются). Ловит
# homoglyph-опечатки (кириллица+латиница в токене: idол/аркy/манёвpирование). Heuristic-поток,
# не гейтит structural_green; остаточные латинские термины (petite/sœur/bouton) — verify-by-eye.
prose_script: cyrillic

# tooling-vocab-in-prose (HEURISTIC, opt-in, vault-index 0.8.0 / §26): техшум — имена
# frontmatter-полей, vault-state фразы, имена скиллов — протёкшие в читательскую прозу.
# Бэкстоп к audit-note §4.0/§4.3. Heuristic-поток, не гейтит structural_green; маскирование
# переиспользует user_only_stub_whitelist (легитимный /audit-review в засеянном стабе щадится).
# state_phrases — regex-источники (компилируются gi); \w ASCII-only → для кириллицы [а-яё].
tooling_vocab:
  field_names: [featured_in, voice_actors, images.cover, co_authored]
  state_phrases: ['карточк[а-яё]* .{0,12}нет', 'в волте', 'plain-text', 'зафиксирован[а-яё]* только']
  flag_skill_commands: true

# Per-module configuration overrides (advanced).
config:
  vault-semantic:
    device: cuda
