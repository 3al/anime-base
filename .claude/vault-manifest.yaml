# Vault manifest — declarative configuration for /init-vault.
# Generated by vault-bootstrap setup. Edit freely.

schema_version: 1
language: ru   # change if your vault content is in a different language

# Modules to install. Dependency resolution is automatic — order does not matter.
# Comment out modules you do not need.
#
# Available modules:
#   [mandatory] core                   Core module — обязательная база для любого волта в bootstrap-фреймворке.
#   [optional]  harness-claude-code    Регистрирует MCP-серверы из всех модулей манифеста в ~/.claude.json
#   [mandatory] skills-common          Тема-нейтральные скиллы, общие для любого волта: fix-links, audit-note,
#   [optional]  vault-index            Структурный MCP-сервер волта: индекс frontmatter, граф ссылок, lint, query.
#   [optional]  vault-semantic         Семантический MCP-сервер волта (L2 в архитектуре RAG) + L3 skill

modules:
  - core
  - harness-claude-code
  - harness-opencode
  - skills-common
  - vault-index
  - vault-semantic

# Folders — routing-table для скилла /new-note.
# Каждая запись описывает тематическую папку волта с описанием
# и (опционально) ключевыми словами / тематическим create-skill.
# Если оставить пустым — /new-note при первом запуске поможет
# зарегистрировать структуру интерактивно.
#
# Пример:
#   folders:
#     - path: GUIDES/
#       description: "Руководства, инструкции, методики"
#       keywords: [guide, howto, tutorial]
#     - path: PROJECTS/
#       description: "Описания проектов и их статусы"
#       create_skill: /new-project   # тематический create-handler (опционально)
folders:
  - path: ANIME/
    description: "Карточки аниме-тайтлов: сериалы, фильмы, OVA"
    keywords: [anime, аниме, series, movie, ova]
    create_skill: /new-anime
  - path: PERSONS/
    description: "Карточки людей из аниме-индустрии: режиссёры, сценаристы, композиторы, продюсеры, аниматоры"
    keywords: [person, персона, человек, режиссёр, director, сценарист, composer, mangaka]
    create_skill: /new-person
  - path: MANGA/
    description: "Карточки манги, ранобэ, light novel"
    keywords: [manga, манга, ranobe, light novel, ранобэ]
  - path: STUDIOS/
    description: "Карточки анимационных студий-производителей (MAPPA, Madhouse, Ufotable, Studio Ghibli и т.п.)"
    keywords: [studio, студия, animation studio, anime production]
    create_skill: /new-studio
  - path: CHARACTERS/
    description: "Карточки вымышленных персонажей аниме и манги"
    keywords: [character, персонаж, hero, герой, villain, antagonist]
    create_skill: /new-character

# Reciprocity pairs — kind-пары, для которых межкарточные навигационные связи
# обязаны быть двунаправленными по конвенции волта. Читается /fix-links (под-режим
# asymmetric) + tool vault_asymmetric_links. Пусто/отсутствует = проверка выключена (opt-in).
# Anime_Base: только character↔character (FK-классы character↔anime/person исключены
# тем, что просто не входят в список — см. docs/Asymmetric_Links_Spec.md §5).
reciprocity_pairs:
  - [character, character]

# Severity для asymmetric-link issue в vault_lint (per-vault). WARN (дефолт) | ERROR.
# Anime_Base: ERROR — реципрокность character↔character железная (см. Linking_guidelines § character).
asymmetry_severity: ERROR

# Per-module configuration overrides (advanced).
config:
  vault-semantic:
    device: cuda
