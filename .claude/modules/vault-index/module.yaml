name: vault-index
version: 0.8.0
description: |
  Структурный MCP-сервер волта: индекс frontmatter, граф ссылок, таблицы,
  инвентарь вложений, lint, query. Подробности — SYSTEM/MCP_Server_Design.md.

  v0.8.0 (заказ Anime_Base §26 + §24-backstop): два lint-правила.
  - `tooling-vocab-in-prose` (HEURISTIC, opt-in, on-demand тело, src/content-lint.ts):
    ловит внутренний bookkeeping волта, протащенный слабой моделью в читательскую
    прозу — имена frontmatter-полей (`featured_in`), vault-state фразы («карточек
    нет»), имена скиллов (`/audit-review`). `mixed-script-prose` ловил латиницу как
    побочку, но не кириллические state-фразы. Theme-neutral: field_names/state_phrases
    (regex-источники)/flag_skill_commands — caller-параметры из `tooling_vocab`
    манифеста. FP-маскирование переиспользует `maskExempt` (код-спаны/wikilinks/
    callout/bold/URL) + USER-ONLY-стаб-whitelist. WARN, отдельный heuristic-поток,
    НЕ гейтит `structural_green`. Бэкстоп к audit-note §4.0/§4.3.
  - `empty-tags` (STRUCTURAL, always-on, src/lint.ts): пустой `tags` → WARN. §24-
    бэкстоп — детерминированный консистентный сигнал вместо «тщательности судьи»
    (судья штрафовал пустой tags на одной карточке, пропускал на другой). WARN,
    не ERROR → не гейтит `structural_green`, но обе аудит-оси видят его одинаково.
  Юнит-тесты node:test 27→38 (pos/neg на оба правила). Tool-count без изменений (16).

  v0.7.1 (приёмка Anime_Base — FP-hardening + perf): (F2) `mixed-script-prose`
  `maskExempt` маскирует Obsidian callout-маркеры `[!type]` (без этого слово-тип
  «warning» из спойлер-callout'ов флагалось на 43/45 карточек); capitalized-
  щажение перенесено ПЕРЕД диакритик-ветку → макрон-имена (Itō/Satō/Yōji) не
  ложно-флагаются, homoglyph-токены (`idол`) ловятся всегда. (F1) `name-surface-
  mismatch` сменил семантику с slug-равенства на order/diacritic-нечувствительный
  token-subset: basename должен СОДЕРЖАТЬ каждый токен поля-имени (лишние токены —
  титулы вроде `King_` — допустимы), снимая 9 FP конвенции Surname_Given vs
  natural-order romaji, но всё ещё ловя `Katteya_Bodler` (нет токенов cattleya/
  baudelaire). (F3, perf) `indexPath` указывал на legacy `.claude/mcp-server/
  index.json` (отсутствует на canonical-волтах → persist ENOENT → full-rebuild на
  каждом ensureFresh); переведён на канонический `.claude/modules/vault-index/mcp/
  index.json` (gitignore.fragment его уже покрывает) + `persist()` mkdir-recursive
  для legacy-волтов. node:test 21→27.

  v0.7.0 (audit lint-backstops, Roadmap §22–§24 + §20): детерминированные
  lint-бэкстопы вместо «внимательности судьи». LintIssue получил `class` —
  `structural` (детерминированный, ~0 FP; `summary.structural_green`) vs
  `heuristic` (нечёткий WARN, отдельный поток, не влияет на green) — чтобы шум
  эвристик не эродировал доверие к структурному сигналу.
  Structural: `broken-table-row` (always-on; ячейка-счёт строки ≠ шапке /
  неэкранированный `|` в `[[...]]` — ловит разорванный рендер таблицы, который
  граф-проверки не видят; парсер несёт policy-free table-скелет в индексе),
  `cover-ref-mismatch` (default-on; ext-mismatch обложки против нового инвентаря
  вложений), `name-surface-mismatch` (opt-in; basename ≠ slug поля),
  `missing-required-tag` (opt-in `requiredTagsByKind` — заменил захардкоженные
  model-card/benchmark/coding-assistant kind-правила, theme-leak из Knowledge_Base).
  Heuristic (opt-in, on-demand чтение тела, src/content-lint.ts):
  `user-only-fabricated`, `mixed-script-prose`. Всё theme-neutral — скрипт/
  секции/поля/теги приходят caller-параметрами из манифеста (контракт
  reciprocity_pairs). §20: `vault_query` generic where (fieldEquals/fieldGte/
  fieldIn, dot-path) + `extra`-проекция. INDEX_VERSION 3→4 (форс-rebuild).
  Юнит-тесты node:test pos/neg на каждое правило (test/rules.test.mjs). 16 tools.

  v0.6.0: +tool `vault_spec_drift` — детерминированный backstop changelog-
  дисциплины (ledger-protocol §4.1). Сверяет spec-requirements манифесты
  create-скиллов (.claude/skills/new-*/SKILL.md) с SYSTEM/spec_changelog.yaml,
  флагает рассинхрон (requirement без changelog-записи / без манифеста).
  Логика — src/spec-drift.ts; читает файлы с диска, независим от note-индекса.
  16 tools total.

  Source в .claude/modules/vault-index/mcp/ (canonical layout). Install
  собирает dist/ через npm install && npm run build, если dist отсутствует
  ИЛИ устарел (src новее dist — B-003: иначе version-bump с правкой src
  оставлял протухший dist, т.к. он gitignored и не пересобирался).
  Legacy layout (.claude/mcp-server/) поддерживается install-handler'ом для
  обратной совместимости и мигрируется через /migrate-vault-index.
mandatory: false
requires:
  - core
provides:
  # Структурированное описание MCP-сервера для harness-* модулей.
  # Шаблонные переменные {vault_root}, {module_dir}, {module_dist}, {module_bin}
  # резолвятся harness-* при компоновке записи в config-файле.
  # Канонический путь only — если волт в legacy layout, harness не найдёт
  # binary и пропустит регистрацию с warning'ом, предлагающим
  # /migrate-vault-index. См. RAG_Architecture.md §8.4.
  mcp_server:
    name: vault-index
    command: node
    args: ["{module_dist}/index.js"]
    env:
      VAULT_ROOT: "{vault_root}"
  skills: []
config_schema: {}
ops:
  install: ops/install.mjs
  status: ops/status.mjs
