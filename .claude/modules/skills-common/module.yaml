name: skills-common
version: 0.9.1
description: |
  Тема-нейтральные скиллы, общие для любого волта: fix-links, audit-note,
  new-note, rename-note, verify, expand-stub, add-note-kind,
  harness-agnostic-audit, vision-gate-audit, audit-by-creator.
  Устанавливаются в .claude/skills/ под `.managed` маркерами — фреймворк может
  синхронизировать обновления, не затирая пользовательские правки.

  v0.9.1 (фидбек эксплуатации Anime_Base — 2 фикса; ledger-контракт остаётся v:1):
  - **empty-tags cross-axis fix.** v0.9.0 audit-note (Шаг 1) велел content-оси
    «консистентно штрафовать empty-tags» — но empty-tags это structural-класс,
    его уже скорит structural-ось (audit-by-creator) → cross-axis double-jeopardy
    за один root-cause. Вердикт: **structural-only**. audit-note Шаг 1 переписан
    (разрешить как улучшение, в content-score НЕ включать). Новый принцип
    `ledger-protocol §4.2` (cross-axis: дефект скорится один раз на оси своего
    класса) — durable-носитель для обеих осей.
  - **§21 prose-bypass конвенция.** Требование, введённое в ПРОЗУ /new-* скилла
    (не в spec-requirements блок), обходит vault_spec_drift + reminder (оба
    анкерятся на блоке) → changelog молча расходится (инцидент titles_noncarded_
    entries, new-character). Детерминированно не ловится. Фикс — конвенция «блок —
    единственный носитель требования; проза поясняет, не объявляет»: codified в
    `ledger-protocol §4.1` + add-note-kind (шаблон «Контракт требований» в каждом
    генерируемом /new-<kind> + инструкция {{spec_requirements_list}}). Опциональный
    эвристик-скан прозы — отложен в backlog (нечёткий, конвенция первична).

  v0.9.0 (заказ Anime_Base §25 + §24): audit-note усилен по двум осям.
  - §25 внешние ссылки — новый Шаг 4.6 (network, opt-in): liveness (web fetch →
    HTTP-код; сетезависим/флапает — не штамповать мёртвой по одному ответу, НЕ
    гейтит structural_green, НЕ пишется в леджер) + адекватность (id в URL совпадает
    с frontmatter, страница про того субъекта — §4.2-эвристика, несовпадение =
    контентный дефект). Новый флаг `--no-network` для явного offline-прогона.
  - §24 prose-clarity — Шаг 4.5 поднят в обязательный форсинг-пасс (мутные/
    невнятные формулировки, которые однопроходный судья пропускает; «не блокер»,
    но durable-фикс = чеклист-форсинг). Без новой оси, остаётся audit_type: content.
  - Шаг 1 прокидывает новые manifest-ключи `tooling_vocab.*` в vault_lint
    (`tooling-vocab-in-prose`); `empty-tags` (structural WARN) разрешается на Шаге 3
    и консистентно штрафуется в оценке.

  v0.8.0 (audit lint-backstops P2, Roadmap §22–§24): managed-скиллы используют
  новые vault-index lint-бэкстопы и ужесточают процедуру судьи.
  - fix-links + audit-note: прокидывают новые manifest-ключи (cover_field,
    name_surface_pairs, required_tags_by_kind, user_only_sections/
    user_only_stub_whitelist, prose_script) в vault_lint; различают
    structural_green vs heuristic-поток (контракт reciprocity_pairs/link_cap).
  - audit-by-creator (§22+§23): марк-ап reverse-leg — артефакт автора (не процесс,
    детерминируется broken-table-row); fix-scoping (чинить только артефакты
    субъекта, чужие → VAULT-DEBT-флаг); пас консистентность/USER-ONLY-авторство/
    разлад создатель↔governance (CREATOR↔GOVERNANCE DISCORD, conformant-автор не
    штрафуется); дисциплина fix-time (vault_backlinks перед мутацией cover).
  - audit-note (§24): смысловой фактчек СОДЕРЖАНИЯ поднят в ядро §4.2 (фактчек
    описаний связей против карточек цели/источника + substance-grounding) —
    приоритетный, не опциональный. Жёстко: НИКАКОЙ новой оси, остаётся
    audit_type: content, усиливается процедура, не схема леджера.

  v0.7.0: add-note-kind генерирует managed spec-requirements блок в порождённом
  /new-<kind> (шаблон new-kind-skill.template.md, placeholder
  {{spec_requirements_list}}) из того же списка требований, что и записи
  spec_changelog.yaml (шаг 4.5c) — 1:1 by construction. Закрывает молчаливый
  пропуск changelog при ручной правке create-скиллов (ledger-protocol §4.1);
  детерминированный backstop — vault_spec_drift. +КРИТИЧНО #16.

  v0.6.0 (epoch-conformance + audit-note флаги — рефайнменты после приёмки):
  - Epoch-conformance (главное): `audit-by-creator` судил карточку ТЕКУЩЕЙ
    спекой создателя, но score приписывается автору-на-момент-создания → штраф
    за пост-авторскую эволюцию схемы (поле введено после `created`), не за
    качество. Смещение системное: старые карточки = сильные модели (baseline),
    свежие = слабые → schema-drift занижает baseline, ломая цель леджера. Фикс:
    новый класс находки `SCHEMA_DRIFT` + epoch-реклассификация в `ledger-
    protocol.md §4.1` — требование с `introduced > created` не штрафуется (vault-
    долг, репортится отдельно, может backfill'иться). Двусторонне: пред-
    существовавшее отсутствующее требование = честный author-defect. Источник
    дат — `SYSTEM/spec_changelog.yaml` (vault-owned контент, framework-defined
    схема, как `enums.yaml`); нет файла/записи → пред-существование (штраф); нет
    `created` → epoch unverifiable. `findings.schema_drift` добавлен аддитивно
    (леджер держался на паузе → миграции нет). На новом волте корректно сразу
    (пустой changelog = нет дрейфа).
  - `add-note-kind` шаг 4.5c: при создании kind авто-аппендит требования
    (обязательные поля + секции) в `spec_changelog.yaml` на сегодня —
    enforcement-at-source, чтобы будущий дрейф логировался в момент ввода.
  - `audit-note` получил флаги `--report-only` + `--no-ledger` (симметрично
    `audit-by-creator`). До 0.6.0 он всегда мутировал карточку и всегда писал в
    леджер — нельзя было ни dry-run, ни пауза леджера. Флаги композируются.
  - НЕ входит (backstop, отдельной итерацией): vault-index детектор «белой
    вороны» (поле у 95% карточек kind, у этой нет) для ловли незалогированного
    дрейфа; per-axis `pristine` (предложение 3 заказчика — после опыта
    эксплуатации). Контент `spec_changelog.yaml` + ретро-сев базы — vault-side.
  Version bump (minor): новый класс находки + новая governance-конвенция
  (`spec_changelog.yaml`) + флаги/поведение managed-скиллов.

  v0.5.0 (audit-by-creator + автоматический леджер качества моделей):
  - Новый managed-скилл `audit-by-creator` (kind-agnostic, audit-aspect): сверяет
    готовую карточку с её СОЗДАЮЩИМ скиллом (`note_kind` → `/new-<kind>`) как с
    источником истины. Читает текст создателя, выводит артефактные инварианты
    (секции/формат/постер/миниатюры/реципрокность), отличая их от процессных
    шагов создателя (web search / скачивание / интерактив — НЕ ре-ранит,
    извлекает конечное состояние). Ловит недореализацию слабых моделей. Vision-
    gate узкий — только визуальный под-чек постера (pre-flight probe), механика
    постера и структурный аудит от зрения не зависят. Использует vault-index
    MCP-tools вместо Grep (`vault_asymmetric_links`, `vault_image_status`,
    `vault_duplicate_basenames`, …). Opencode-wrapper генерится автоматически.
  - Леджер качества моделей (побочный эффект аудита, НЕ background/hooks/cron):
    единый SSOT `audit-by-creator/references/ledger-protocol.md` — JSONL-схема
    (`SYSTEM/model_quality.jsonl`, `v:1`), формула score (штраф от базы: −2 за
    MISSING, −1 за WRONG_FORMAT, NEEDS_EXTERNAL без штрафа, пол 1), нормализация
    ID модели (strip provider-префикс + access-tier суффикс — `glm-5.1` ≡
    `zai-coding-plan/glm-5.1`, `minimax-m3-free` ≡ `minimax-m3.free`; сырое в
    `authored_model_raw`), дедуп точных дублей по `content_hash`, флаги
    `fixes_applied`/`pristine` против контаминации, дисциплина `judge_model`/
    `audit_type`. `structural` (audit-by-creator) vs `content` (audit-note) —
    оси не смешиваются в агрегатах.
  - Принцип «аудит НЕ авторствует» (фикс §6.4 ТЗ): скиллы, ПРОИЗВОДЯЩИЕ контент
    (`/new-*`, `/expand-stub`, `/vault-rag`), ставят `co_authored`; скиллы,
    РЕВЬЮЯЩИЕ/оценивающие (`/audit-note`, `/audit-by-creator`), — НЕ трогают
    `co_authored` вовсе. Перезапись `co_authored` на судью уничтожала origin-
    автора как субъект оценки для последующих аудитов (capture-at-entry живёт
    один прогон) → структурные косяки слабой модели писались на судью. След
    судьи теперь только в `ledger.judge_model`. Кросс-осевая контаминация
    (judge починил карточку до замера другой оси) гасится флагом `pristine`
    (запись не теряется, вью сравнения фильтрует `pristine=true`).
  - `audit-note` обновлён (§6.5): оценивает автора и аппендит в леджер
    (`audit_type: content`); читает origin-автора на входе; **`co_authored` не
    перезаписывает никогда** (override устаревшего `Audit_checklist §4.8`),
    только `quality:draft`+`updated` при правках. Носитель правила — managed
    SKILL.md (чеклист seed-once, апдейт его не достигает; core 0.8.1 правит
    шаблон §4.8 forward-only для новых волтов).
  Version bump (minor): новый скилл + изменение поведения managed `audit-note`.
  Marker version bump триггерит re-sync managed копий при следующем /init-vault.

  v0.4.8 (B-009 + B-010 — vision-gate pre-flight probe + capability-ось):
  - B-009: `vision-gate-audit` и `add-note-kind` переведены на pre-flight
    probe — gate-шаг открывает через Read core-ассет
    `.claude/assets/vision_probe.png` ДО любого скачивания (вердикт по
    поведению Read), вместо пробы на первом боевом постере. Канон-SSOT
    `add-note-kind/templates/image-handling.claude-fragment.md` переписан;
    `add-note-kind` баннер/gallery_section/КРИТИЧНО #12 ссылаются на probe.
    Слепая модель узнаёт о слепоте до первой сетевой попытки (ноль скачиваний,
    без удаления-после-факта). Probe-ассет генерит core install ≥ 0.8.0.
  - B-010: `vision-gate-audit` классификатор (2.2) переведён с оси «про фото
    ли скилл» на **«требуется ли визуальное суждение?»** (хардкод имён
    `add-image`/`audit-images` убран) — механическая укладка готового файла
    выведена из gate-scope (не флагать, никакого ложного STOP). `--no-images`
    сделан **обязательным** для download-capable скилла (отсутствие в
    argument-hint = issue ретрофита, не «опционально»). Theme_Skills_Patterns
    синхронизирован. Legacy-проба-на-постере — мягкий drift на миграцию.

  v0.4.5 (add-note-kind — творческая часть + самопроверка, общая форма):
  Мотив: на E2E v0.4.4 модель залила instance-specific поля (издание) на
  карточку произведения, не заметив внутреннего противоречия — генерируемый
  скилл был «рельсой», без точки самопроверки. Усиление БЕЗ хардкода
  частных решений (add-note-kind остаётся общим генератором — КРИТИЧНО #14):
  - Lever A: новая ось типизации поля — intrinsic (свойство сущности) vs
    instance-specific (свойство воплощения/издания/релиза). Напряжение с
    единицей учёта (probe 1.6) ловится на дизайне (фаза 2.2).
  - Lever B: placeholder `{{consistency_checks}}` + шаг 6.9 в генерируемом
    скилле. add-note-kind ВЫВОДИТ конкретные проверки согласованности из
    семантики kind и впечатывает в порождённый скилл (мета-инструкция «как
    вывести», не зашитый список). Гоняется перед записью файла.
  - Lever C: фаза 2.4 — на развилках дизайна предлагать 2–3 варианта с
    tradeoff'ами, не railroad'ить одну схему.
  - КРИТИЧНО #14: guard — kind-specific логика выводится и живёт в
    порождённом /new-<slug>, не хардкодится в add-note-kind.
  Patch: уточнения/добавления в существующий скилл, контракт не ломается.

  v0.4.4 (F7 — USER-ONLY поля никогда не удаляются):
  - Найдено на E2E v0.4.3 (Opencode/GLM): поле `rating` (рекомендуемое +
    USER-ONLY) GLM удалил из frontmatter по правилу «ненайденную строку
    можно удалить» → пользователь о поле не узнал. Удаление USER-ONLY поля
    убивает discoverability — противоречит смыслу F5 (поле-приглашение).
  - Fix: `add-note-kind` шаг 4.8 + template шаг 4 — USER-ONLY поля
    рендерятся ВСЕГДА, НИКОГДА не удаляются при создании, даже если
    опциональные. «Удалить ненайденную строку» теперь явно только про
    не-USER-ONLY рекомендуемые поля.
  Patch: уточнение существующего правила, контракт не ломается.

  v0.4.3 (add-note-kind generation-quality — F4/F5/F6 из Phase 6.2b):
  - F5 (`USER-ONLY` дисциплина): субъективные поля/секции (отзыв, рейтинг,
    статус) больше не выдумываются генерируемым /new-<kind>. Фаза 2.2/3.2
    помечают их `USER-ONLY`; шаг 4.8 рендерит как пустой плейсхолдер
    (`_Заполняется пользователем._` в теле, `# USER-ONLY` во frontmatter).
    Новая КРИТИЧНО #13. Та же дисциплина, что у co_authored/фактчекинга.
  - F6 (рекомендуемые поля): `{{fields_yaml}}` рендерит обязательные И
    рекомендуемые (опциональные/закомментированные) поля — пользователь
    узнаёт о них, /new-<kind> заполняет web-находимые.
  - F4 (`--no-images` целостно): новый placeholder `{{argument_hint}}` —
    image-kind получает флаг в сигнатуре + шаг детекции в фото-секции
    (`{{gallery_section}}` п.0) + упоминание в баннере. КРИТИЧНО #12
    расширена. Закрывает хлипкий escape-hatch гейта.
  - Фаза 1.6 (опц. probe): «единица учёта kind + основной сценарий» —
    нудж против семантических пробелов схемы (произведение vs издание).
  Patch (не minor): add-note-kind — существующий скилл, контракт не
