  v0.4.1 (harness-agnostic by default — unconditional cross-harness setup):
  - `harness-agnostic-audit`: снят гейт «Opencode detected» с генерации
    wrappers (Этап 4) — wrappers создаются всегда, для всех скиллов волта.
    CC игнорирует .opencode/commands/, Opencode при следующем заходе
    подхватывает готовое без ручных шагов. Принцип: волт harness-agnostic
    by default, не «опционально совместим с Opencode».
  - `harness-agnostic-audit`: новый Этап 5 — вставка durable sub-block в
    CLAUDE.md (marker-managed `<!-- harness-agnostic-conventions:start/end -->`).
    Sub-block содержит cheat-sheet правил R1-R8 + рекомендации по workflow.
    Всегда в контексте агента → ручные правки скиллов автоматически
    следуют правилам, без необходимости перезапускать audit. Безусловная
    вставка (не гейтится на detection харнеса).
  - `add-note-kind` шаг 4.9: снят гейт — wrapper для нового /new-<slug>
    создаётся всегда, не только при Opencode-detection.
  - Итоговый Summary в harness-agnostic-audit обновлён под новые шаги.
