name: harness-claude-code
version: 0.4.0
description: |
  Регистрирует MCP-серверы из всех модулей манифеста в ~/.claude.json
  (Claude Code harness) под project-scoped ключом
  projects[<vault_root>].mcpServers. Делает резервные копии перед патчем
  с ротацией (последние 5).

  v0.4.0 (Этап 1B opencode-support — shared harness libs):
  - lib/config_patch.mjs, lib/mcp_registry.mjs, lib/template_vars.mjs
    переехали в core/lib/. ops/install.mjs и ops/status.mjs обновили
    import-paths на '../../core/lib/...'. Поведение идентично v0.3.0
    (refactor only) — теперь harness-opencode v0.1.0 переиспользует
    те же helpers. См. core v0.7.5 changelog.

  v0.3.0 (Phase 6.1, fix D8): mcp_registry.buildRegistry теперь маркирует
  каждый entry полем `installed: bool` через проверку per-vault `.installed`
  marker модуля. ops/install.mjs пропускает регистрацию для !installed
  (модуль failed или skipped install handler'ом) с понятным warning'ом
  module_not_installed. Без этого fix'а MCP-сервер прописывался в
  ~/.claude.json даже когда install модуля провалился — CC отображал
  ✘ failed при подключении, что вводило в заблуждение.
  detectMissingBinary теперь покрывает .js/.mjs/.cjs (раньше только .js).

  v0.2.0: generic-итерация по `provides.mcp_server` каждого модуля манифеста
  с резолвом template-vars ({vault_root}, {module_dir}, {module_dist},
  {module_bin}). Reconcile-семантика — add/update only, удаление модуля из
  манифеста не вычищает регистрацию автоматически (manual cleanup).
  Контракт template-vars — RAG_Architecture.md §8.4.
mandatory: false
requires:
  - core
provides:
  mcp_server: null
  skills: []
config_schema:
  config_path:
    type: string
    description: Override path to Claude Code config (default ~/.claude.json).
    default: null
ops:
  install: ops/install.mjs
  status: ops/status.mjs
