name: vault-semantic
version: 0.5.1
description: |
  Семантический MCP-сервер волта (L2 в архитектуре RAG) + L3 skill
  `/vault-rag` (router). Hybrid search поверх embedding-модели + BM25
  через SQLite + sqlite-vec, с RRF-fusion. См. docs/RAG_Architecture.md.

  v0.5.1 (char-budget calibration follow-up к 0.5.0): закрыт класс «при
  эскалации (`k≥~18`) на текстовых волтах envelope превышает harness cap,
  хотя `payload.bounded` рапортует, что бюджет включился» (Anime_Base,
  26 prose-cards: k=20 → `bounded:true, full=17`, но tool-result = 68 631
  байт → всё равно spill). ДВЕ причины:
    1. Единица бюджета. 0.5.0 мерил `len(json.dumps(...))` в Python str-
       символах, а harness-cap бьётся по байтам/токенам. Для кириллицы
       1 символ = 2 UTF-8 байта → 40k-символьный бюджет давал ~68 KB на
       диске. Fix: `SearchResponse.to_dict` считает FULL record (text +
       metadata) в UTF-8 байтах. `bounded`/budget теперь честны для не-ASCII;
       публичное имя `response_max_chars` сохранено (value = байтовый
       бюджет), payload получил `budget_unit: utf8_bytes` + `approx_bytes`.
       (NB: `note_metadata` в 0.5.0 УЖЕ считался в бюджете — диагноз репорта
       «budget не считает metadata» был неточен; реальная причина — единица.)
    2. Дублирование. После удаления `frontmatter_prefix` (0.5.0 §1)
       доминирующим балластом стал `note_metadata.extra` = полный frontmatter
       карточки (staff[]/aliases/genres/urls/images), повторявшийся verbatim
       на КАЖДОМ чанке одной заметки (3 чанка Maria-sama → 3× один extra).
       Fix: в lean-режиме `ChunkResult.to_dict` дропает `extra` (роутер имеет
       `note_path` + скаляры, читает карточку напрямую на Этапе 3 когда extra
       нужен). В `full` — `extra` сохраняется. Ранжирование/порядок не
       затронуты; header-only локаторы по-прежнему без metadata.
  Эффект (валидировано на синтетике prose-cards с fat extra): k=20 lean —
  ~37 KB envelope в одном tool-result без spill (было 68 KB), `bounded`
  отражает реальный байтовый размер. Это и материализует экономию контекста,
  которой 0.5.0 не давал (header-only урезка считалась в неверной единице).
  SKILL.md §2.2 дополнен заметкой про lean-`note_metadata` без `extra`;
  bump версии ре-синкает managed-копию. pyproject.toml bumped 0.5.0→0.5.1
  синхронно.

  v0.5.0 (bound search response size + skill-side adaptive escalation):
  закрывает класс «`vault_semantic_search` с `k≥20` на текстовых волтах
  превышает harness per-tool-result token cap» (Anime_Base, 26 заметок:
  k=25 → ~90 KB/~25k tokens → spill-to-file). Разведены два порога: (A)
  harness-cap — НЕ управляется модулем, out of scope; (B) размер, который
  EMIT'ит сервер — его и ограничиваем by construction.
    1. Lean payload (`models.py::ChunkResult.to_dict`): `frontmatter_prefix`
       больше не сериализуется в MCP-вывод (дубль `note_metadata`; в
       indexing/embedding остаётся), `score_components` — только при
       `verbosity='full'` (debug). Ранжирование не затронуто, режется лишь
       вес payload.
    2. Char-budget (`models.py::SearchResponse.to_dict`): top-N чанков —
       full record, хвост — header-only локаторы (`note_path`+`section_path`+
       `score`). Bounds вывод даже при небрежном `k`. Top-1 всегда full
       (одиночный oversized chunk = легитимный spill-путь). `payload.bounded`
       сигналит скиллу, что хвост урезан.
    3. Per-call args на `vault_semantic_search`: `verbosity` (lean|full) и
       `response_max_chars` (clamp к [2000, 200000]). `k`/`min_score` были
       per-call и раньше.
    4. Default `k` 20→12 (`search.py::DEFAULT_K`); добавлен `K_CEILING=40` —
       per-call clamp (anti-runaway), `K_HARD_CAP=100` остаётся абсолютным
       schema-потолком. SKILL.md §2.2/§2.3 синхронизированы.
    5. `/vault-rag` SKILL.md §2.6 — формализована адаптивная эскалация с
       явными триггерами (результатов <3 / max score <0.5 / пустое L1∩L2),
       разведением recall (расширять) vs precision (сужать), макс. 1–2
       попытки. Инвариант: эскалация двигает request-параметры, никогда —
       harness-cap; overflow обрабатывается чтением спиленного файла.
  config_schema расширен декларациями `response_verbosity`/`response_max_chars`/
  `k_ceiling`/`response_max_chars_ceiling` (floors/ceilings). NB: сегодня
  runtime-сервер получает конфиг ТОЛЬКО через `provides.mcp_server.env`, а
  `core/lib/template_vars.mjs::TOKEN_RE` не умеет резолвить `config.*` —
  поэтому config-defaults пока НЕ долетают до running server (значения берутся
  из серверных констант). Пламбинг `config.vault-semantic.* → env` —
  отдельный follow-up в core (см. roadmap). pyproject.toml bumped синхронно
  (0.4.7→0.5.0) — `importlib.metadata.version` остаётся source of truth для
  stats/warmup/smoke.

  v0.4.7 (Этап 1A opencode-support — vault-rag SKILL.md rewrite):
  переписаны 10 procedural MCP-вызовов формата `mcp__<server>__<tool>`
  в harness-agnostic форму `<server> MCP, tool <tool>(args)`. Это
  правило R1 из docs/Vault_Bootstrap_Architecture.md § Body content.
  CC-only префикс `mcp__` в Opencode не валиден (там tool name =
  `<server>_<tool>`); natural language reference позволяет модели в
  обоих харнесах самостоятельно префиксировать имя. Non-functional
  refactor, version bumped для триггера re-sync managed копии в
  `<vault>/.claude/skills/vault-rag/` (install handler сравнивает
  `.managed{version}` с module version и skip'ает up-to-date).
  Follow-up patch (2026-05-27): `mcp/pyproject.toml` bumped 0.4.6→0.4.7
  отдельным коммитом — первый v0.4.7 commit забыл синхронизировать
  pyproject (нарушение конвенции из v0.4.6 changelog). Без этого
  `importlib.metadata.version("vault-semantic")` (источник правды для
  smoke test и `stats.version`) рапортовал старую 0.4.6 при актуальной
  module.yaml 0.4.7.

  v0.4.6 (status.mjs scope auto-resolve): фикс false-negative класса.
  Раньше `ops/status.mjs` определял `install_scope` исключительно из
  input'а (default `per-vault`); вызывающий обязан был помнить, что для
  shared-модулей нужно передать `install_scope: "shared"` + явный
  `shared_module_dir`. Забыл — handler уходил в per-vault ветку, проверял
  несуществующий `module_dir/mcp/.venv` и честно рапортовал
  `module_status: partial` / `venv_exists: false`. Реальный shared venv в
  `$VAULT_TOOLS_HOME/vault-semantic/` при этом работал, MCP-сервер был
  connected. Случилось в Anime_Base 2026-05-24 (ложная тревога в
  init-vault report). Архитектурно `install_scope` — свойство модуля
  (декларировано в `module.yaml`), не runtime-выбор. Fix: handler читает
  `install_scope` из своего же `module.yaml` (via `readModuleInstallScope`),
  input остаётся как override для тестов. Для shared scope: если
  `shared_module_dir` не в input — derive из `core/lib/paths.mjs::
  resolveSharedToolsHome()` + `MODULE_NAME` (тот же путь, что использует
  `setup.mjs` и `core/lib/shared_install.mjs`). Smoke: вызов без
  `install_scope` против Mushroom_Base даёт `installed` + корректный
  `shared_root` вместо false-negative `partial`.

  v0.4.5 (deploy shim/ to shared root): фикс регрессии Phase 4.7.
  `module.yaml::provides.mcp_server.args` ссылается на
  `{shared_module_dir}/shim/index.mjs`, но `core/lib/shared_install.mjs::
  provisionSharedRoot` копировал только `mcp/` (single-tree contract).
  shim/ — sibling папка, никем не деплоился; до сегодня работал у
  оригинального автора только потому что shim/index.mjs был руками
  скопирован при создании Phase 4.7 (17 мая) и не менялся. Третья
  установка во внешнем волте (2026-05-21) поймала binary_missing от
  harness D8 — vault-semantic не зарегистрировался. Fix: `runSharedInstall`
  после `shared_source_verified` копирует `bootstrap_module_dir/shim/` →
  `shared_module_dir/shim/` через cpSync(force) — идемпотентно, на каждом
  install подхватывает свежий shim. Закрывает и сегодняшний bug, и silent
  staleness loophole для существующих установок. Action: `shim_deployed`.

  v0.4.4 (shared-aware recommendation): `needs_torch_decision` payload
  расширен полями `shared_torch_variant`, `recommended_variant`,
  `recommendation_reason`. Handler теперь сам считает, какую опцию
  пометить Recommended, учитывая state shared venv'а: если shared уже
  зафиксирован — рекомендация ровно эта, чтобы избежать
  `needs_shared_torch_swap_consent` dance и не дёргать reindex других
  волтов. Без shared marker — CUDA для волтов >25 заметок, иначе CPU.
  Закрывает UX-баг найденный в реальном прогоне Recipes_Base 2026-05-20:
  при выборе на маленьком волте Recommended стоял на CPU без учёта того,
  что shared уже на CUDA для двух других волтов. SKILL.md Шаг 6.1.1
  обновлён — скилл больше не считает Recommended сам, использует
  `decision.recommended_variant`.

  v0.4.3 (Этап E плана v0.4.0 + __version__ cleanup): (1) `/vault-rag`
  skill — персонализированный ETA первичного reindex. Health-check Этап
  0.1 теперь берёт `totalNotes` из `vault_stats` (L1), читает
  `torch_variant` из per-vault `.installed` marker, показывает
  реалистичную оценку (CPU/CUDA вилка из таблицы замеров) перед запросом
  согласия на reindex. Доводит до конца план v0.4.0 perf. (2) Python
  `__version__` теперь читается из `pyproject.toml` через
  `importlib.metadata.version("vault-semantic")` — единый source для
  `stats.version` / `warmup.version` / `pip show`. Раньше
  `vault_semantic/__init__.py::__version__` был хардкод "0.3.0" с Phase
  4.5 и протух за все последующие bump'ы. pyproject.toml бампается
  синхронно с `module.yaml` (две точки правды, но обе явные).

  v0.4.2 (D22 instrumentation): `ensureVenvAndInstall` теперь логирует
  все ветки и `python -m venv` invocations в `<shared>/.venv-audit.log`
  через `core/lib/venv_audit.mjs`. Цель — поймать mystery createur
  пустого .venv (наблюдавшийся 2026-05-20). Events: `_entry` (с venv_exists
  до), `python_dash_m_venv_invoke` + `_done` (с exit code), `venv_verified`,
  `venv_rm_unhealthy`. Audit-tolerance: write errors swallowed; stderr
  echo с префиксом `[venv-audit]` для inline visibility. Требует core
  ≥ 0.7.3.

  v0.4.1: shared variant conflict guard. Shared venv — один на машину
  для всех волтов; swap torch в нём затрагивает всех. install.mjs читает
  `.installed{torch_variant}` shared marker и, если уже зафиксирован
  variant ≠ requested, emit'ит `status: needs_shared_torch_swap_consent`
  (вместо silent swap). Skill спрашивает юзера — swap затронет все
  волты, либо переключить manifest этого волта на текущий shared
  variant. Bypass через input `_allow_torch_swap: true` после согласия.
  Payload содержит `current_shared_variant`, `requested_variant`,
  `other_registered_projects` (walk ~/.claude.json), `swap_cost_min`.
  Closes гочку «два волта с разным выбором гоняют torch туда-сюда».

  v0.4.0 (этапы B+C+D плана v0.4.0 perf): GPU-aware torch install.
  install.mjs пробит nvidia-smi → при device=auto и обнаружении NVIDIA
  GPU emit `status: needs_torch_decision` (вместо silent install) — skill
  показывает юзеру trade-off (disk +2.4 GB vs ~5x reindex speedup на
  RTX-class GPU, замерено 30 мин → 5 мин 41 сек на 77 notes/1354
  chunks) и пишет выбор в манифест `config.vault-semantic.device:
  cpu|cuda`. При device=cuda устанавливает torch с
  `--extra-index-url https://download.pytorch.org/whl/cu126` (cu126 —
  единственная стабильная линия с cp314-wheels на момент v0.4.0).
  Marker `.installed` теперь содержит `torch_variant: cpu|cuda_cu126` —
  install детектит drift (manifest device != installed variant) и
  свопает torch на ходу. README обновлён с реалистичной disk-таблицей
  (этап D). Этап A (manual CUDA torch swap на dev-машине) проверил
  гипотезу.

  v0.3.2: UX-fix формулировки `next_step` в `ops/install.mjs` (shared
  branch). Старый текст «выполните vault_semantic_reindex через MCP-tool»
  путал юзера — MCP tools в Claude Code вызываются через NL-запрос
  агенту, не через прямой UI. Новый текст: «попросите Claude
  проиндексировать волт (например: "проиндексируй волт")». Этап F плана
  v0.4.0 (см. Vault_Bootstrap_Roadmap.md).

  v0.3.1: добавлен skill `/vault-rag` — L3-роутер над vault-index (L1) и
  vault-semantic (L2). Pure LLM-driven (только SKILL.md), устанавливается
  в `.claude/skills/vault-rag/` с .managed marker. Hard dep на vault-semantic
  встроена структурно (skill и MCP — один модуль).

  v0.3.0 (Phase 4.7): HTTP transport через тонкий Node stdio-shim.
  Обход Windows MSVCRT-буферизации Python stdio (вешает FastMCP-stdio
  через Bun/CC pipes). Shim в shim/index.mjs: при старте поднимает
  Python с MCP_HTTP_PORT=<free>, проксирует stdin JSON-RPC ↔ HTTP POST
  на /mcp. FastMCP запускается в stateless_http+json_response режиме.
  На Linux/Mac stdio по-прежнему работает прямо (env-fallback).

  v0.2.0 (Phase 4.6): lazy refresh-on-query. vault_semantic_search и
  vault_semantic_stats перед обработкой вызывают incremental_refresh()
  — module-level mtime-snapshot + 2s debounce, по аналогии с vault-index
  ensureFresh(). Snapshot match → SQLite не трогаем; mtime изменилась →
  reindex(scope='changed'). Стоимость на типичные 0-2 изменения между
  запросами — 0-300ms amortized.

  v0.1.0: leaf-impl закрыт. 7 Python-модулей (lemmatizer, chunking,
  embedding, models, indexer, search, server), 4 MCP tools
  (vault_semantic_search/reindex/stats/warmup). Реальный pipeline на
  bge-m3 (1024-dim, L2-normalized) + chonkie RecursiveChunker + FTS5
  с lemmatize-at-index (pymorphy3 RU / snowball EN) + sqlite-vec vec0.
  Валидирован E2E на synth-волте (4 заметки → 10 чанков, dense
  semantic recall + lemmatized bm25 green).

  Layout: install_scope=shared. Heavy-артефакты (venv ~3GB, bge-m3 ~2GB,
  source-копия) живут в $VAULT_TOOLS_HOME/vault-semantic/ — один на
  машину. Per-vault — только vault.sqlite + .installed marker.
  Подробно: docs/Shared_Install_Architecture.md.
mandatory: false
install_scope: shared
requires:
  - core
  - vault-index
provides:
  # Generic MCP-server contract для harness-* (RAG §8.4 + Shared_Install §5).
  # Шаблоны {vault_root}, {module_bin}, {shared_module_dir} резолвятся harness'ом:
  #   {module_bin}        → $VAULT_TOOLS_HOME/vault-semantic/.venv/Scripts (или bin)
  #   {shared_module_dir} → $VAULT_TOOLS_HOME/vault-semantic/
  #   {vault_root}        → абс. путь конкретного волта (различается между регистрациями)
  #
  # Phase 4.7: command — Node-shim, не Python напрямую. Shim
  # (shim/index.mjs) спавнит Python в HTTP transport на свободном порту
  # и проксирует stdio JSON-RPC ↔ HTTP. Обходит Windows MSVCRT-буферизацию
  # Python stdio через Bun (CC runtime). На Linux/Mac stdio работал бы
  # прямо, но единый путь упрощает регистрацию и тестирование.
  mcp_server:
    name: vault-semantic
    command: "node"
    args: ["{shared_module_dir}/shim/index.mjs"]
    env:
      VAULT_SEMANTIC_PYTHON: "{module_bin}/python"
      VAULT_ROOT: "{vault_root}"
      HF_HOME: "{shared_module_dir}/data/hf-cache"
      PYTHONIOENCODING: "utf-8"
  skills:
    - vault-rag
config_schema:
  embedding_model:
    type: string
    description: HuggingFace model ID для embeddings (default — bge-m3, см. RAG §2).
    default: BAAI/bge-m3
  device:
    type: string
    enum: [auto, cpu, cuda]
    description: |
      Целевое устройство для embedding-сабграфа torch. v0.4.0+:
        - `auto` (default): install.mjs пробит nvidia-smi; если NVIDIA GPU
          найдена и в `.installed` ещё нет `torch_variant` — install
          возвращает `status: needs_torch_decision` (skill спрашивает
          юзера, пишет `cpu`/`cuda` в манифест). Если GPU не найдена —
          silent CPU.
        - `cpu`: дефолтный PyPI torch (~200 MB wheel, ~1.2 GB venv).
        - `cuda`: torch с `--extra-index-url https://download.pytorch.org/whl/cu126`
          (~2.6 GB wheel, ~3.5 GB venv, ~5x reindex speedup на RTX-class GPU).
      Drift между manifest и `.installed{torch_variant}` → install свопает
      torch на ходу (~7 мин download для cuda variant).
    default: auto
  # v0.5.0 — response-size budget knobs. ВНИМАНИЕ: пока ДЕКЛАРАТИВНЫ.
  # Runtime-сервер получает конфиг только через provides.mcp_server.env, а
  # core/lib/template_vars.mjs::TOKEN_RE не резолвит config.* в env — поэтому
  # эти значения ещё НЕ долетают до running server (он использует серверные
  # константы из models.py/search.py). Per-call override этих параметров на
  # vault_semantic_search РАБОТАЕТ уже сейчас. Config-defaults подключатся,
  # когда в core появится механизм config.<module>.* → env (roadmap follow-up).
  response_verbosity:
    type: string
    enum: [lean, full]
    description: |
      Дефолтная детализация payload поиска (floor; per-call `verbosity`
      переопределяет). `lean` — без `score_components`/`frontmatter_prefix`;
      `full` — добавляет debug `score_components`. См. models.py.
    default: lean
  response_max_chars:
    type: integer
    description: |
      Дефолтный бюджет вывода поиска (top-N full → хвост header-only). v0.5.1:
      считается в UTF-8 БАЙТАХ (единица harness-cap; имя `*_chars` сохранено
      для совместимости API/конфига). Per-call `response_max_chars`
      переопределяет, clamp к [2000, response_max_chars_ceiling].
    default: 40000
  k_ceiling:
    type: integer
    description: |
      Потолок per-call `k` (anti-runaway). Не может превышать абсолютный
      schema-cap 100. Сейчас энфорсится серверной константой K_CEILING.
    default: 40
  response_max_chars_ceiling:
    type: integer
    description: |
      Потолок для per-call `response_max_chars`. Сейчас энфорсится серверной
      константой RESPONSE_MAX_CHARS_CEILING.
    default: 200000
ops:
  install: ops/install.mjs
  status: ops/status.mjs
